# Weekly Tech Debt PR — PDF 12쪽 "대상 리팩터링 pull request 생성"
#
# 매주 docs/tech-debt-tracker.md 에서 상위 항목 1개를 골라 Claude 가
# 리팩터링 PR 을 생성한다.
#
# 철학(PDF 12쪽): *"기술 부채는 고금리 대출과 같아서, 이자가 쌓여 고통스럽게
# 한꺼번에 갚는 것보다 조금씩 꾸준히 갚아나가는 편이 훨씬 낫습니다."*
#
# 한 주에 한 개. 크기도 작게. 사람의 리뷰가 부담되지 않아야 함.

name: weekly-tech-debt-pr

on:
  schedule:
    - cron: "0 19 * * 1"  # UTC 월요일 19:00 = KST 화요일 04:00
  workflow_dispatch:
    inputs:
      item_index:
        description: "tech-debt-tracker.md 에서 몇 번째 항목을 처리할지 (기본 1 = 최상위)"
        required: false
        default: "1"

permissions:
  contents: write
  pull-requests: write

jobs:
  pay-down-debt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tracker exists
        id: check
        run: |
          if [[ ! -f docs/tech-debt-tracker.md ]]; then
            echo "tracker 없음 — 이 워크플로는 docs/tech-debt-tracker.md 를 요구한다."
            echo "운영 프로젝트라면 tracker 를 먼저 만들고, 아니면 이 워크플로를 꺼라."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract top item
        if: steps.check.outputs.skip != 'true'
        id: item
        run: |
          set -euo pipefail
          idx="${{ github.event.inputs.item_index || '1' }}"
          # tracker 의 `## ` 로 시작하는 항목 중 idx 번째를 꺼낸다
          item=$(awk -v n="$idx" '
            /^## / { c++; if (c==n) { capture=1; print; next } else if (capture) exit }
            capture { print }
          ' docs/tech-debt-tracker.md)
          if [[ -z "$item" ]]; then
            echo "item_index=$idx 에 해당하는 항목 없음 — 부채 tracker 가 비어 있거나 index 초과."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          {
            echo 'item<<EOF'
            echo "$item"
            echo EOF
          } >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      ### EDIT ME — Claude 호출 방식은 프로젝트에 맞게 고를 것.
      ### 아래는 `@anthropic-ai/claude-code` CLI 사용 예시. 월 구독으로 돌리려면
      ### Claude Code CLI + 로그인 세션, API 사용이면 `ANTHROPIC_API_KEY` + SDK.
      - name: Run Claude refactor
        if: steps.check.outputs.skip != 'true' && steps.item.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEBT_ITEM: ${{ steps.item.outputs.item }}
        run: |
          set -euo pipefail
          echo "=== 대상 부채 ==="
          echo "$DEBT_ITEM"
          echo "================="

          # 여기서 실제 Claude 호출. 예시(의사 코드):
          #
          #   npx @anthropic-ai/claude-code --headless \
          #     --prompt "다음 tech debt 항목을 리팩터링해. 최소 변경으로,
          #     기존 테스트가 전부 녹색이어야 함. 새 파일은 생성 금지.
          #     변경 후 'REFACTOR_DONE' 을 stdout 에 출력해.
          #     대상: $DEBT_ITEM"
          #
          # 그 다음 git diff 로 변경 감지.
          echo "Claude 호출은 프로젝트 규약에 맞게 구현할 것. 이 step 은 의사코드."

      - name: Create PR if changes
        if: steps.check.outputs.skip != 'true' && steps.item.outputs.skip != 'true'
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "변경 없음 — PR 생성 스킵"
            exit 0
          fi
          branch="harness/tech-debt-$(date -u +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git add -A
          git commit -m "refactor(tech-debt): weekly pay-down (automated)"
          git push -u origin "$branch"
          gh pr create \
            --title "[harness] weekly tech-debt pay-down" \
            --body "자동 생성. 대상 항목은 \`docs/tech-debt-tracker.md\` 최상위. 사람 리뷰 필수." \
            --label "harness,tech-debt"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

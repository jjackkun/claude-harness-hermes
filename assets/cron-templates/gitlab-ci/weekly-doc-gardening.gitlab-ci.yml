# Weekly Doc Gardening — PDF 12쪽 "정기적으로 편차를 검사" (GitLab CI 판)
#
# GitHub Actions 판과 동일한 4종 검사. GitLab Schedules 에서 주 1회 실행하도록 설정.
#
# ## 설치 절차
#
# 1) 본 파일을 프로젝트 루트에 `.gitlab-ci.yml` 로 복사 (없을 때) 하거나
#    기존 `.gitlab-ci.yml` 에 이 job 을 include.
#    include 권장:
#      include:
#        - local: '.gitlab/doc-gardening.yml'
#    → 그리고 본 파일을 `.gitlab/doc-gardening.yml` 로 위치시킴.
#
# 2) GitLab 프로젝트 → Settings → CI/CD → Schedules → New schedule:
#      Description: weekly doc gardening
#      Interval Pattern: 0 18 * * 0  (UTC 일 18:00 = KST 월 03:00)
#      Target branch: main
#
# 3) GitLab 프로젝트 → Settings → CI/CD → Variables 에 `GITLAB_API_TOKEN`
#    (scope: api, role: Developer 이상) 등록. Issue 생성용.
#
# 4) 수동 먼저 한 번 — Schedules 목록에서 ▶ 버튼으로 dry-run.
#
# ## 검사 항목 (GitHub 판과 동일)
#   (1) CLAUDE.md dead link
#   (2) 완료된 exec-plan 이동 대상
#   (3) core-beliefs R 룰 ↔ 강제 장치 매칭
#   (4) 최근 30일 반복 수정 파일 (룰 승격 후보)

doc-gardening:
  stage: .post
  image: alpine:3.19
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"  # 수동 dry-run 허용
  variables:
    GIT_DEPTH: "0"  # git log 전체 필요
  before_script:
    - apk add --no-cache bash git curl jq grep
  script:
    - |
      set -euo pipefail
      report="/tmp/drift-report.md"
      : > "$report"

      # (1) CLAUDE.md dead link
      if [ -f CLAUDE.md ]; then
        while IFS= read -r link; do
          [ -z "$link" ] && continue
          if [ ! -e "$link" ]; then
            echo "- [dead-link] \`CLAUDE.md\` → \`$link\` (존재하지 않음)" >> "$report"
          fi
        done < <(grep -oE '\]\([^)]+\.md[^)]*\)' CLAUDE.md | sed -E 's/^\]\(//; s/\).*$//; s/#.*$//')
      fi

      # (2) 완료된 exec-plan 이동 대상
      if [ -d docs/exec-plans ]; then
        while IFS= read -r plan; do
          if grep -qiE '^(status|상태):\s*(done|완료)' "$plan" 2>/dev/null; then
            echo "- [plan-graduation] \`$plan\` 은 완료 상태 → \`docs/audits/\` 로 이동 고려" >> "$report"
          fi
        done < <(find docs/exec-plans -name '*.md' -not -name 'template.md')
      fi

      # (3) core-beliefs R 룰 ↔ 강제 장치 매칭
      if [ -f docs/design-docs/core-beliefs.md ]; then
        while IFS= read -r rule; do
          rid=$(echo "$rule" | grep -oE '^R[0-9]+')
          [ -z "$rid" ] && continue
          if ! grep -rq "$rid" --include='*.py' --include='*.ts' --include='*.js' --include='*.sh' . 2>/dev/null; then
            echo "- [rule-unenforced] \`$rid\` 에 대응하는 테스트/린터 강제가 발견되지 않음" >> "$report"
          fi
        done < <(grep -E '^##\s*R[0-9]+' docs/design-docs/core-beliefs.md)
      fi

      # (4) 룰 승격 후보 (최근 30일 fix/bug/revert 커밋에서 반복 수정 파일)
      if [ -d .git ]; then
        since=$(date -u -d '30 days ago' +%Y-%m-%d 2>/dev/null || date -u +%Y-%m-%d)
        git log --since="$since" --name-only --pretty=format: \
          --grep='^\(fix\|bug\|revert\)' 2>/dev/null \
          | grep -v '^$' | sort | uniq -c | sort -rn \
          | awk '$1 >= 3 { print $2 " (" $1 "회 수정)" }' > /tmp/hot-files.txt || true
        if [ -s /tmp/hot-files.txt ]; then
          echo "" >> "$report"
          echo "### 🔥 룰 승격 후보 (반복 수정 파일)" >> "$report"
          echo "" >> "$report"
          while IFS= read -r line; do
            echo "- [rule-candidate] \`$line\` — \`harness-promote-rule\` 스킬 invoke 고려" >> "$report"
          done < /tmp/hot-files.txt
        fi
      fi

      ### EDIT ME — 프로젝트별 편차 검사 추가

      if [ -s "$report" ]; then
        title="[doc-gardening] 편차 감지 — $(date -u +%Y-%m-%d)"
        body="# Doc Gardening Report — $(date -u +%Y-%m-%d)

다음 편차가 감지됐다. **차단 명령이 아니라 판단 가이드**다.
각 항목은 *살펴봐야 할 대상* 이며, 고칠지 말지는 도메인 맥락을
아는 사람/에이전트가 결정한다.

$(cat "$report")"

        if [ -z "${GITLAB_API_TOKEN:-}" ]; then
          echo "GITLAB_API_TOKEN 미설정 — Issue 생성 스킵. 리포트는 job log 에 인쇄."
          echo "$body"
          exit 0
        fi

        curl --fail --silent --show-error \
          --request POST \
          --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
          --header "Content-Type: application/json" \
          --data "$(jq -n --arg t "$title" --arg b "$body" '{title: $t, description: $b, labels: "harness,doc-gardening"}')" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/issues" > /dev/null
        echo "Issue created: $title"
      else
        echo "No drift detected."
      fi

# presets/_common.conf
# Loaded ONLY by public-claude.sh. Installs globally to ~/.claude/.
# Holds the stack-agnostic skills, agents, and rules shared by every project.
#
# Variable convention: use `+=` everywhere so presets compose additively.

# --- Skills (stack-agnostic) ---
# search-first             : research-before-coding workflow (prevents wheel reinvention)
# strategic-compact        : smart context compaction at logical boundaries
# continuous-learning-v2   : hook-based instinct learning with project isolation
# verification-loop        : build → typecheck → lint → test → security gate
# coding-standards         : language-agnostic code quality rules
SKILLS+=(
  search-first
  strategic-compact
  continuous-learning-v2
  verification-loop
  coding-standards
)

# --- Agents (stack-agnostic) ---
# architect              : high-level design and module boundaries
# planner                : multi-phase task decomposition
# code-reviewer          : general PR review
# silent-failure-hunter  : finds empty catches, bogus fallbacks, swallowed errors
# refactor-cleaner       : dead code / duplication removal
# performance-optimizer  : hot-path and query optimization
# tdd-guide              : enforces test-first workflow
# docs-lookup            : fast external doc retrieval
# doc-updater            : keeps README / docstrings in sync with code
AGENTS+=(
  architect
  planner
  code-reviewer
  silent-failure-hunter
  refactor-cleaner
  performance-optimizer
  tdd-guide
  docs-lookup
  doc-updater
)

# --- Rules ---
RULES+=(common)

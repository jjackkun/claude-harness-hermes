# presets/database/mysql.conf
# MySQL / MariaDB.

SKILLS+=(
  database-migrations
)
# TODO: mysql-patterns 스킬 자산 제작 시 SKILLS 에 복원
# TODO: mysql 룰 자산 제작 시 RULES+=(mysql) 복원

AGENTS+=(
  database-reviewer
)

read -r -d '' _mysql_section <<'EOF' || true
## MySQL / MariaDB
- 문자셋: `utf8mb4` 강제 (`utf8` 은 3바이트라 이모지 누락)
- 정렬: `utf8mb4_0900_ai_ci` (MariaDB 는 `uca1400_ai_ci`)
- 기본 스토리지 엔진: InnoDB. MyISAM 신규 사용 금지
- `ONLY_FULL_GROUP_BY` SQL_MODE 가정
- 트랜잭션 격리 수준 기본은 `REPEATABLE READ` — 의존하는 코드 주의
- DDL 변경은 운영 락이 길다 — `pt-online-schema-change` 또는 gh-ost 검토
- DATETIME 보다 TIMESTAMP 우선 (TZ 인식)
EOF
CLAUDE_MD_SECTIONS+=("$_mysql_section")
unset _mysql_section

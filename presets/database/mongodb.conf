# presets/database/mongodb.conf
# MongoDB.

# TODO: mongodb-patterns 스킬 자산 제작 시 SKILLS+=(mongodb-patterns) 복원
# TODO: mongodb 룰 자산 제작 시 RULES+=(mongodb) 복원

AGENTS+=(
  database-reviewer
)

read -r -d '' _mongo_section <<'EOF' || true
## MongoDB
- 스키마는 명시적으로 — 코드(Pydantic / Mongoose / Spring Data) 측에 정의
- `_id` 는 `ObjectId` 기본, 외부 노출용 ID 가 필요하면 `uuid` 별도 컬럼
- 인덱스는 쿼리 패턴 보고 미리 생성. ESR(Equality, Sort, Range) 순서 원칙
- 트랜잭션은 가능하지만 비싸다 — replica set 필수, 짧게 사용
- 집계 파이프라인은 단계마다 `$project` 로 페이로드 축소
- `$lookup` 남용 금지 — 관계가 강하면 RDBMS 가 맞다
- 임베디드 vs 참조 결정은 "함께 읽는가? 함께 갱신되는가?" 기준
EOF
CLAUDE_MD_SECTIONS+=("$_mongo_section")
unset _mongo_section

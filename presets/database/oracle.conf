# presets/database/oracle.conf
# Oracle Database (legacy enterprise stacks).

SKILLS+=(
  database-migrations
)
# TODO: oracle-patterns 스킬 자산 제작 시 SKILLS 에 복원
# TODO: oracle 룰 자산 제작 시 RULES+=(oracle) 복원

AGENTS+=(
  database-reviewer
)

read -r -d '' _oracle_section <<'EOF' || true
## Oracle
- 식별자 길이는 30바이트 (12c 이전) / 128바이트 (12c+) — 환경 확인 후 사용
- 시퀀스 + 트리거 또는 12c 이상에서는 `IDENTITY` 컬럼
- DATE 는 시간 포함, 시분초만 필요해도 `TO_CHAR(..., 'HH24:MI:SS')`
- 페이징은 `FETCH FIRST N ROWS ONLY` (12c+) 또는 `ROWNUM` 서브쿼리
- PL/SQL 패키지로 비즈니스 로직 캡슐화 — 직접 SQL 산재 금지
- 바인드 변수 사용 의무 (SQL injection + 라이브러리 캐시 보호)
- LOB 컬럼은 별도 테이블 스페이스 권장
EOF
CLAUDE_MD_SECTIONS+=("$_oracle_section")
unset _oracle_section

# presets/database/redis.conf
# Redis (cache, queue, pub/sub).

# TODO: redis-patterns 스킬 자산 제작 시 SKILLS+=(redis-patterns) 복원
# TODO: redis 룰 자산 제작 시 RULES+=(redis) 복원

read -r -d '' _redis_section <<'EOF' || true
## Redis
- 키 네이밍 규약: `<service>:<entity>:<id>` (콜론 구분)
- 모든 키에 TTL 부여 — 영구 저장 용도면 별도 namespace
- 큰 값(>100KB) 금지 — 청크화 또는 외부 스토리지
- `KEYS *` 운영 환경 절대 금지 — `SCAN` 사용
- 분산 락은 Redlock 또는 `SET NX PX` + 토큰 검증, 단순 `SETNX` 단독 금지
- Pub/Sub 은 메시지 내구성 없음 — 이력 필요하면 Streams 사용
- Lua 스크립트는 atomicity 가 필요할 때만, 길어지면 코드로
EOF
CLAUDE_MD_SECTIONS+=("$_redis_section")
unset _redis_section

# presets/database/postgres.conf
# PostgreSQL.

SKILLS+=(
  postgres-patterns
  database-migrations
)

AGENTS+=(
  database-reviewer
)

RULES+=(postgres)

read -r -d '' _pg_section <<'EOF' || true
## PostgreSQL
- 개발 DB 포트: 별도 명시 없으면 사용자 환경 기본 포트(보통 5432) 사용
- 마이그레이션은 코드와 함께 커밋 (alembic / flyway / dbmate / prisma 등 — 프로젝트 따름)
- 운영 DB 직접 변경 금지. 항상 마이그레이션 파일 경유
- 인덱스 추가 시 `CREATE INDEX CONCURRENTLY` 검토 (운영 락 회피)
- `JSONB` 는 스키마가 정말 가변적일 때만. 검색 컬럼은 정규화
- `SELECT *` 금지 — 컬럼 명시
- 트랜잭션 격리 수준은 기본 `READ COMMITTED`. 변경 시 이유를 코드 주석으로
- 시간 컬럼은 `TIMESTAMPTZ` (TIMESTAMP WITHOUT TZ 금지)
EOF
CLAUDE_MD_SECTIONS+=("$_pg_section")
unset _pg_section

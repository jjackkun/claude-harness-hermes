# presets/workflow/harness.conf
#
# 하네스 엔지니어링 프리셋.
# PDF "에이전트 우선 세계에서 Codex 활용하기" (Ryan Lopopolo) 방법론의 *메타 인프라* 만 배포.
# 도메인 룰(R1·R3 등)은 *배포하지 않는다* — PDF 11쪽 "특정 구조와 툴링에 따라 크게 달라지므로
# 일반화 가정 금지" 준수. 각 프로젝트가 docs/design-docs/core-beliefs.md 에 자기 룰을 직접 정의.
#
# 활성화되는 것:
#   1. Claude 보조 스킬 2개 (boundary-check, reasoning-sandwich)
#   2. 매 턴 규율 리마인더 hook (UserPromptSubmit) — PDF 4쪽
#   3. git commit 가드 hook (PreToolUse Bash) — 리뷰 검토 리마인드 + --no-verify 탐지
#   4. prettier 경고 hook (PostToolUse Edit) — 감각 학습
#   5. git pre-commit 4단 검사 (.git/hooks/pre-commit)
#   6. CLAUDE.md 100줄 부트섹터 + ARCHITECTURE.md + docs/ 트리 — PDF 5쪽
#   7. 공통 권한 화이트리스트 (base.json) — PDF 9쪽 "엄격한 경계"
#   8. ESLint max-lines 보편 룰 — PDF 9쪽 "맞춤형 린터"
#
# 사용:
#   project-claude.sh ~/PROJECT/new-app python fastapi postgres harness
#
# rim-kanban 의 도메인 룰(R1 모드 격리, R3 LLM 경로, R2 legacy 격리)은 본 preset 이
# *배포하지 않는다*. 그것들은 rim-kanban 고유 결정이고, ai-dev-setting/assets/rules/harness/
# 에 *예시* 로 보존되어 있다 (사용자가 필요 시 직접 참고).

# ── 1. Claude 보조 스킬 (이미 자산에 존재) ──────────────────────────────────
SKILLS+=(
  harness-boundary-check
  harness-reasoning-sandwich
  harness-promote-rule
  structured-file-layout
)

RULES+=(harness)

# ── 1-1. R7(설계/계획 문서 리뷰 제안)에서 호출하는 에이전트 ────────────────
# R7 은 문서 리뷰에 lite reviewer 를 먼저 호출하고, 깊은 검토가 필요할 때만
# architect/planner 로 escalates 한다.
# harness preset 이 책임지고 해당 에이전트를 함께 배포한다.
# (_common.conf 의 architect/planner 는 public-claude.sh 전용이라 project 설치엔 안 들어옴)
AGENTS+=(
  architect-lite
  planner-lite
  architect
  planner
  code-reviewer
  silent-failure-hunter
  tdd-guide
  doc-updater
  docs-lookup
  performance-optimizer
  refactor-cleaner
)

# ── 2~4. Claude hook 스크립트 (assets/hooks/ 에서 프로젝트 scripts/hooks/ 로 복사) ─
HARNESS_HOOK_SOURCES+=(
  claude-userpromptsubmit-reminders.sh
  claude-pretooluse-bash-guard.sh
  claude-pretooluse-agent-guard.sh
  claude-posttooluse-prettier-warn.sh
  claude-posttooluse-size-warn.sh
  claude-posttooluse-review-reminder.sh
  claude-posttooluse-dead-file-warn.sh
  claude-stop-perm-prompt-fatigue.sh
)

# settings.local.json hooks 섹션 등록 (project-claude.sh 가 자동 호출)
# 경로 prefix 는 ${CLAUDE_PROJECT_DIR} — Claude Code 가 hook 실행 시 주입하는 env var.
# 단일 따옴표로 감싸 setup 시점 확장을 막고, 실제 shell 실행 시점에 확장되게 한다.
# (버그 기록: 2026-04-17 상대 경로 CWD 의존으로 4개 hook silent-fail — docs/exec-plans/completed/2026-04-17-harness-hook-path-cwd-bug.md)
USER_PROMPT_SUBMIT_HOOKS+=('${CLAUDE_PROJECT_DIR}/scripts/hooks/claude-userpromptsubmit-reminders.sh')
PRE_TOOL_USE_HOOKS+=('Bash::${CLAUDE_PROJECT_DIR}/scripts/hooks/claude-pretooluse-bash-guard.sh')
PRE_TOOL_USE_HOOKS+=('Task|Agent::${CLAUDE_PROJECT_DIR}/scripts/hooks/claude-pretooluse-agent-guard.sh')
POST_EDIT_HOOKS+=('${CLAUDE_PROJECT_DIR}/scripts/hooks/claude-posttooluse-prettier-warn.sh')
POST_EDIT_HOOKS+=('${CLAUDE_PROJECT_DIR}/scripts/hooks/claude-posttooluse-size-warn.sh')
POST_EDIT_HOOKS+=('${CLAUDE_PROJECT_DIR}/scripts/hooks/claude-posttooluse-review-reminder.sh')
POST_EDIT_HOOKS+=('${CLAUDE_PROJECT_DIR}/scripts/hooks/claude-posttooluse-dead-file-warn.sh')
STOP_HOOKS+=('${CLAUDE_PROJECT_DIR}/scripts/hooks/claude-stop-perm-prompt-fatigue.sh')

# ── 5. git pre-commit 4단 검사 ──────────────────────────────────────────────
HARNESS_PRE_COMMIT=1

# ── 6. PDF 5쪽 docs 트리 (CLAUDE.md 100줄 부트섹터 + ARCHITECTURE.md + docs/) ─
HARNESS_DOCS_TEMPLATES=1

# ── 7. 공통 권한 화이트리스트 (base.json 의 allow 항목 머지) ────────────────
# merge_permissions_file() 헬퍼로 통일 (3차 PR). 언어별 추가 권한은
# presets/permissions/{node,python,pm2,git-write}.conf 를 함께 지정.
merge_permissions_file "$ASSETS_DIR/permissions/base.json"

# ── 8. ESLint max-lines (TS/JS 프로젝트 옵션) ───────────────────────────────
HARNESS_LINT_MAX_LINES=1

# ── 8-bis. 4차원 — 정기 가비지 컬렉션 (PDF 12쪽, 4차 PR) ────────────────────
# weekly-doc-gardening 만 자동 배치. git remote 감지로 GitHub/GitLab 별 템플릿 선택.
# has_drift=false 면 Issue 를 만들지 않으므로 빈 프로젝트에도 노이즈 없음.
# 끄려면 =0. 미지원 remote host (로컬/Gitea 등) 는 자동 스킵.
HARNESS_DOC_GARDENING=1
#
# 나머지 GC 워크플로는 *자동 배치하지 않는다* — Claude API 비용 수반하므로 명시 승인 필요.
# 수동 설치: assets/cron-templates/github-actions/README.md 참조.
#   - nightly-quality-score.yml  (Claude API)
#   - weekly-tech-debt-pr.yml    (Claude API)

# ── 9. CLAUDE.md 안내 섹션 ──────────────────────────────────────────────────
# 도메인 룰은 *박지 않는다*. 대신 사용자에게 어디에 적어야 하는지 안내만.
read -r -d '' _harness_section <<'EOF' || true
## 하네스 엔지니어링 (PDF 방법론)

이 프로젝트는 ai-dev-setting 의 `harness` 프리셋으로 다음 강제 장치가 깔려 있다:

- **매 턴 규율 리마인더**: `scripts/hooks/claude-userpromptsubmit-reminders.sh`
- **커밋 전 리뷰 검토 리마인드**: `scripts/hooks/claude-pretooluse-bash-guard.sh`
- **잘못된 에이전트 dispatch 차단**: `scripts/hooks/claude-pretooluse-agent-guard.sh`
- **편집 후 prettier 경고**: `scripts/hooks/claude-posttooluse-prettier-warn.sh`
- **편집 후 size 조기 경고 (400/500)**: `scripts/hooks/claude-posttooluse-size-warn.sh`
- **코드 편집 기록 리마인드**: `scripts/hooks/claude-posttooluse-review-reminder.sh`
- **git pre-commit 4단 검사**: `.git/hooks/pre-commit` (size + prettier + eslint + pytest)
- **추론 샌드위치**: 비자명한 작업은 계획 → 구현 → 검증. 깊은 리뷰는 필요할 때만 승격.

**프로젝트 고유 불변 원칙(R1~Rn)은 `docs/design-docs/core-beliefs.md` 에 직접 정의한다.**
PDF 11쪽 인용: "이러한 동작은 이 리포지터리의 특정 구조와 툴링에 따라 크게 달라지며,
유사한 투자 없이 일반화할 수 있다고 가정해서는 안 된다."

위반 발견 시: 즉시 중단·보고. `--no-verify` 우회 금지.
규율이 잘못이라고 판단되면 그 *근거*를 `docs/audits/` 에 기록한 뒤 규율을 고친다.

## 작업 기록 시스템 (PDF 5~6쪽)

리포지터리의 지식 베이스는 `docs/` 디렉터리에 구조화되어 관리된다.
**핸드오프 메모가 아닌 리포지터리 안의 계획 문서가 세션 간 연속성의 원천이다.**

- `docs/exec-plans/backlog/` — 언젠가 할 작업 후보 (우선순위 미정)
- `docs/exec-plans/active/` — 진행 중인 작업 계획 (세션 시작 시 반드시 읽을 것)
- `docs/exec-plans/completed/` — 완료된 작업 (의사결정 로그 보존)
- `docs/design-docs/` — 설계 결정 + 불변 원칙(R 룰)
- `docs/audits/` — 조사·감사 기록

**강제 규칙:**
1. 비자명한 작업 시작 전 `docs/exec-plans/active/YYYY-MM-DD-<slug>.md` 작성 (템플릿: `docs/exec-plans/template.md`)
2. 작업 완료 시 회고(§8) 작성 후 `completed/`로 이동
3. 세션 시작 시 `active/` 에 문서가 있으면 먼저 읽고 이어감
4. 미래 작업 후보는 `backlog/`에 날짜 없이 `<slug>.md`로 보관
5. `.claude/memory/`의 핸드오프 파일 대신 `docs/exec-plans/`를 사용
EOF
CLAUDE_MD_SECTIONS+=("$_harness_section")
unset _harness_section

#  presets/workflow/skill-dev.conf
# Claude Code 스킬을 직접 만들고 개선할 때 쓰는 프리셋.
# ai-dev-setting 자체를 개발하거나, 프로젝트에 새 스킬을 추가할 때 선택.
#
# 예:
#   project-claude.sh ~/PROJECT/ai-dev-setting skill-dev

SKILLS+=(
  skill-creator
)

read -r -d '' _skill_dev_section <<'EOF' || true
## Skill Development

- 새 스킬/기존 스킬 개선 작업 시 **skill-creator 스킬을 반드시 invoke**
- frontmatter 의 `description` 이 트리거 정확도를 결정한다 — 구체적 키워드 + 조건 명시
- 스킬 본문은 실제 호출됐을 때만 로드되므로 용량보다 **description 정확도** 에 투자
- 변경 후 skill-creator 의 평가/벤치마크 도구로 트리거 정확도 검증
EOF
CLAUDE_MD_SECTIONS+=("$_skill_dev_section")
unset _skill_dev_section

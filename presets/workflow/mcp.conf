# presets/workflow/mcp.conf
# MCP (Model Context Protocol) 서버를 만들 때 쓰는 프리셋.
# Python (FastMCP) 또는 Node/TypeScript (MCP SDK) 기반 서버 개발 시 선택.
#
# 예:
#   project-claude.sh ~/PROJECT/my-mcp-server python mcp
#   project-claude.sh ~/PROJECT/my-mcp-server node mcp

SKILLS+=(
  mcp-builder
)

read -r -d '' _mcp_section <<'EOF' || true
## MCP Server Development

- 새 MCP 서버 또는 기존 서버 확장 시 **mcp-builder 스킬 호출 필수**
- 도구 이름은 동사+명사로 구체적이게 (`create_issue`, `search_docs`)
- 도구 설명은 LLM 이 **언제 호출해야 할지** 를 결정하므로 트리거 조건을 명확히
- 입력 스키마는 JSON Schema 로 엄격하게. Optional 필드에도 description 필수
- 에러는 구조화된 오브젝트로 반환 (LLM 이 복구 가능하도록)
- 민감한 작업은 리소스/프롬프트 승인 패턴 활용
EOF
CLAUDE_MD_SECTIONS+=("$_mcp_section")
unset _mcp_section

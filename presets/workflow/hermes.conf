# presets/workflow/hermes.conf
#
# 헤르메스 엔지니어링 프리셋.
# 하네스 엔지니어링 위에 자가 진화 러닝 루프를 올린다.
# 선행 조건: harness.conf 가 함께 선택되어야 한다.
#
# 활성화되는 것:
#   1. SQLite 기억 구조 초기화 (global + project)
#   2. /hermes-status 슬래시 커맨드 스킬
#   3. hermes-crystallize 스킬 (자동 스킬화 트리거)
#   4. CLAUDE.md 헤르메스 안내 섹션
#
# 사용:
#   project-claude.sh ~/PROJECT/new-app python fastapi postgres harness hermes

# ── 0. 권한 ─────────────────────────────────────────────────────────────────
# (sqlite3 CLI 의존 제거됨 — python sqlite3 모듈만 사용하므로 별도 Bash 권한 불필요)

# 헤르메스 결정화 서브세션(claude -p)은 .hermes/ 에 직접 쓰므로 워크트리 격리 불필요
WORKTREE_BG_ISOLATION+=("none")

# ── 1. 스킬 ─────────────────────────────────────────────────────────────────
SKILLS+=(
  hermes-status
  hermes-crystallize
  hermes-recall
  hermes-dream
  hermes-loop
)

# ── 1-1. Stop Hook (러닝 루프) + UserPromptSubmit 실수 감지 ─────────────────
HARNESS_HOOK_SOURCES+=(claude-stop-retrospective.sh)
HARNESS_HOOK_SOURCES+=(claude-userpromptsubmit-mistake-detect.sh)
STOP_HOOKS+=('${CLAUDE_PROJECT_DIR}/scripts/hooks/claude-stop-retrospective.sh')
USER_PROMPT_SUBMIT_HOOKS+=('${CLAUDE_PROJECT_DIR}/scripts/hooks/claude-userpromptsubmit-mistake-detect.sh')

# ── 1-2. SessionStart Hook (드리밍 자동 트리거, cron 대체) ──────────────────
# startup/resume 세션 시작 시 하루 1회(throttle) 드리밍을 백그라운드로 구동.
# 끄기: HERMES_DREAM_ON_SESSION_START=0 / 간격: HERMES_DREAM_THROTTLE_HOURS(기본 20)
HARNESS_HOOK_SOURCES+=(claude-sessionstart-dream.sh)
SESSION_START_HOOKS+=('${CLAUDE_PROJECT_DIR}/scripts/hooks/claude-sessionstart-dream.sh')
HARNESS_HOOK_SOURCES+=(claude-sessionstart-memory-guard.sh)
SESSION_START_HOOKS+=('${CLAUDE_PROJECT_DIR}/scripts/hooks/claude-sessionstart-memory-guard.sh')
HARNESS_HOOK_SOURCES+=(claude-sessionstart-history-reindex.sh)
SESSION_START_HOOKS+=('${CLAUDE_PROJECT_DIR}/scripts/hooks/claude-sessionstart-history-reindex.sh')

# ── 1-3. PostToolUse Hook (C1 — 어려움 신호 기반 스킬 주입) ─────────────────
# Bash 도구가 터미널 실패(401/permission denied/Traceback/FAILED 등)를 내면
# 관련 결정화 스킬을 그 자리에서 에이전트 컨텍스트에 주입한다.
# 상한: 이벤트당 1개 / 세션당 3개(HERMES_ASSIST_MAX_PER_SESSION).
# 근거: docs/superpowers/specs/2026-07-09-hermes-injection-trigger-design.md
HARNESS_HOOK_SOURCES+=(claude-posttooluse-hermes-assist.sh)
POST_TOOL_USE_HOOKS+=('Bash::${CLAUDE_PROJECT_DIR}/scripts/hooks/claude-posttooluse-hermes-assist.sh')

# ── 2. DB 초기화 + 스킬 인덱싱 + 스크립트 복사 ────────────────────────────
_hermes_setup() {
  local project_path="$1"
  local scripts_dir
  scripts_dir="$(cd "$(dirname "${BASH_SOURCE[0]}")/../.." && pwd)/scripts"

  if [[ ! -f "$scripts_dir/hermes-init.py" ]]; then
    log_warn "hermes-init.py not found — DB 초기화 건너뜀"
    return 0
  fi

  # hermes python 스크립트를 프로젝트 scripts/ 로 복사
  # (훅 파일이 복사된 뒤 PROJECT/scripts/ 를 기준으로 찾기 때문에 필수)
  local target_scripts="$project_path/scripts"
  mkdir -p "$target_scripts"
  local hermes_scripts=(
    hermes-init.py
    hermes-save-session.py
    hermes_save_session_storage.py
    hermes_save_session_signals.py
    hermes_save_session_patterns.py
    hermes-crystallize.py
    hermes-increment.py
    hermes-search.py
    hermes-evolve-skill.py
    hermes-index-skills.py
    hermes_skills.py
    hermes_redact.py
    hermes-correlate.py
    hermes-prune.py
    hermes-export-history.py
    hermes-reindex.py
    hermes-manager.py
    hermes-message.py
    hermes-cron-run.sh
    hermes-cleanup.py
    hermes-summarize.py
    hermes-recall.py
    hermes_reuse.py
    hermes-lifecycle.py
    hermes_lifecycle_apply.py
    hermes-dream.py
    hermes_loop.py
    hermes_loop_prompt.py
    hermes_loop_report.py
    hermes-loop.py
    hermes-loop-run.sh
  )
  local copied_count=0
  for s in "${hermes_scripts[@]}"; do
    if [[ -f "$scripts_dir/$s" ]]; then
      cp "$scripts_dir/$s" "$target_scripts/$s"
      chmod +x "$target_scripts/$s"
      copied_count=$((copied_count + 1))
    fi
  done
  log_info "  hermes  → scripts/ 에 python 스크립트 ${copied_count}개 복사"

  # 업스트림에서 삭제된 구버전 스크립트 정리 (업데이트 시 고아 복사본 잔존 방지)
  local hermes_removed=(
    hermes-build-prompt.py
    hermes_signals.py
  )
  for s in "${hermes_removed[@]}"; do
    if [[ -f "$target_scripts/$s" ]]; then
      rm -f "$target_scripts/$s"
      log_info "  hermes  → 구버전 스크립트 제거: scripts/$s"
    fi
  done

  # DB 초기화
  if ! python3 "$target_scripts/hermes-init.py" --both "$project_path" 2>/dev/null; then
    log_warn "헤르메스 DB 초기화 실패 (python3 확인 필요)"
    return 0
  fi
  log_info "  hermes  → DB 초기화 완료 ($project_path/.hermes/state.db)"

  # 기존 하네스 스킬 인덱싱
  local db_path="$project_path/.hermes/state.db"
  local skills_dir="$project_path/.claude/skills"
  if [[ -d "$skills_dir" ]]; then
    python3 "$target_scripts/hermes-index-skills.py" \
      --db "$db_path" \
      --skills-dir "$skills_dir" \
      --scope "harness" 2>/dev/null || true
    log_info "  hermes  → 하네스 스킬 인덱싱 완료"
  fi
}

# NOTE: 여기서 즉시 실행하지 않는다.
# _hermes_setup 은 project-claude.sh 의 설치 단계(dry-run 분기 이후,
# install_skills 이후)에서 호출된다 — source 시점에 실행하면 --dry-run 에서도
# 파일이 생성되고, 첫 설치 시 .claude/skills 가 없어 스킬 인덱싱이 스킵된다.

# ── 3. .gitignore 에 .hermes/ 추가 ──────────────────────────────────────────
# .hermes/* 로 내용물만 무시해야 !.hermes/skills/ 예외가 동작함.
# .hermes/ 전체를 무시하면 git이 하위를 재검사하지 않아 예외가 무효가 됨.
GITIGNORE_ENTRIES+=(".hermes/*")
GITIGNORE_ENTRIES+=("!.hermes/skills/")
GITIGNORE_ENTRIES+=("!.hermes/skills/**")
GITIGNORE_ENTRIES+=("!.hermes/history/")
GITIGNORE_ENTRIES+=("!.hermes/history/**")

# ── 5. 자율 에이전트 (선택) ──────────────────────────────────────────────────
# HERMES_AUTONOMOUS=1 로 설정하면 cron 설정 가이드를 출력한다.
# 자동 cron 등록은 하지 않음 — 사용자가 직접 설정해야 한다.
# 참고: docs/hermes-cron-guide.md
_hermes_autonomous_hint() {
  local project_path="$1"
  log_info "  hermes  → 자율 에이전트 힌트 (HERMES_AUTONOMOUS=1)"
  log_info "    cron 설정: docs/hermes-cron-guide.md 참고"
  log_info "    매니저 테스트:"
  log_info "      python3 $project_path/scripts/hermes-manager.py \\"
  log_info "        --db $project_path/.hermes/state.db \\"
  log_info "        --action start --projects <프로젝트명>"
}

if [[ "${HERMES_AUTONOMOUS:-0}" == "1" && -n "${PROJECT_PATH:-}" ]]; then
  _hermes_autonomous_hint "$PROJECT_PATH"
fi

# ── 4. CLAUDE.md 안내 섹션 ──────────────────────────────────────────────────
read -r -d '' _hermes_section <<'EOF' || true
## 헤르메스 엔지니어링 (Hermes Engineering)

이 프로젝트는 `hermes` 프리셋으로 자가 진화 러닝 루프가 활성화되어 있다.

**기억 구조:**
- `[project]/.hermes/state.db` — 프로젝트 전용 SQLite (세션 기억 + 스킬 인덱스)
- `~/.hermes/global.db` — 전역 SQLite (공통 패턴 + 사용자 성향)

**자동 동작 (Claude Code 세션 훅 기반 — Codex 세션에서는 미동작, 추후 버전업에서 지원 예정):**
- 세션 종료 시 러닝 루프: 저장 → 롤링 요약 → 결정화(반복 3회+) → 스킬 효용 상관·강등
- 결정화된 스킬은 `[project]/.hermes/skills/` 에 저장
- 세션 시작 시(startup/resume): 관련 스킬 자동 검색 주입 + 직전 세션 요약 회상 주입 + 하루 1회 드리밍 자동 실행(throttle 20h, 백그라운드)
- 작업 도중 Bash 가 터미널 실패(401·permission denied·Traceback·FAILED 등)를 내면 관련 스킬을 그 자리에서 주입 (세션당 최대 3회)

**슬래시 커맨드:**
- `/hermes-status` — 전체 스킬/규칙/세션 현황 확인
- `/hermes-crystallize` — 대기 패턴 즉시 결정화 (수동 실행)
- `/hermes-recall` — 직전 세션 요약 키워드 검색·회상
- `/hermes-dream` — 드리밍 결정화 수동 실행 (누적 요약 → 승격 + junk 스킬 정리 제안)

**자율 에이전트 (선택):**
- cron + `scripts/hermes-cron-run.sh` 로 매니저 에이전트 자동 실행 가능
- 설정 방법: `docs/hermes-cron-guide.md` 참고
- 테스트: `python3 scripts/hermes-manager.py --db .hermes/state.db --action start --projects <프로젝트명>`

**목표 기반 자율 루프:**
- 헤드리스: `scripts/hermes-loop-run.sh <프로젝트> "<목표>"` — 완료/안전캡까지 자율 반복
- 대화형: `/hermes-loop <목표>` — 현재 세션에서 반복 (파괴적 작업은 승인 게이트)
- 상태/중단: `python3 scripts/hermes-loop.py status` / `... stop <loop-id>`
- 재개: `scripts/hermes-loop-run.sh <프로젝트> --resume <loop-id>`
- 가이드: `docs/hermes-loop-guide.md`

**원칙:**
- 로컬 스킬 진화는 자동, 공통(ai-dev-setting) 반영은 사용자 승인 후 PR
- AI가 공통 스킬을 자동으로 수정하는 것은 금지
- 파괴적 작업(삭제·force push)은 자율 에이전트도 절대 자동 실행하지 않는다
EOF
CLAUDE_MD_SECTIONS+=("$_hermes_section")
unset _hermes_section

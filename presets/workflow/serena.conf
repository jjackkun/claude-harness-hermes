# presets/workflow/serena.conf
# Serena MCP 코드 인덱싱 도구를 강제 사용하도록 룰을 박는 프리셋.
# Serena 자체는 setup.sh 가 머신 전역으로 자동 설치하므로 별도 설치 불필요.
# 코드 심볼이 많은 프로젝트(Python / TypeScript / Java / Dart 등 LSP 지원 언어)에서만 선택.
# bash·markdown·문서 위주 리포지토리에는 비추천 (LSP 가치 낮음, 토큰만 소모).

# Serena MCP 도구 자동 허용 (execute_shell_command 만 제외 — Bash 우회 위험)
# 매번 권한 프롬프트 뜨는 것 방지. 28개 도구는 파일/심볼/메모리 작업으로 프로젝트
# 디렉터리 범위에 한정되므로 일반적 Edit/Write 권한과 같은 위험 수준.
HARNESS_PERMISSIONS_ALLOW+=(
  mcp__plugin_serena_serena__activate_project
  mcp__plugin_serena_serena__check_onboarding_performed
  mcp__plugin_serena_serena__create_text_file
  mcp__plugin_serena_serena__delete_memory
  mcp__plugin_serena_serena__edit_memory
  mcp__plugin_serena_serena__find_declaration
  mcp__plugin_serena_serena__find_file
  mcp__plugin_serena_serena__find_implementations
  mcp__plugin_serena_serena__find_referencing_symbols
  mcp__plugin_serena_serena__find_symbol
  mcp__plugin_serena_serena__get_current_config
  mcp__plugin_serena_serena__get_diagnostics_for_file
  mcp__plugin_serena_serena__get_symbols_overview
  mcp__plugin_serena_serena__initial_instructions
  mcp__plugin_serena_serena__insert_after_symbol
  mcp__plugin_serena_serena__insert_before_symbol
  mcp__plugin_serena_serena__list_dir
  mcp__plugin_serena_serena__list_memories
  mcp__plugin_serena_serena__onboarding
  mcp__plugin_serena_serena__read_file
  mcp__plugin_serena_serena__read_memory
  mcp__plugin_serena_serena__rename_memory
  mcp__plugin_serena_serena__rename_symbol
  mcp__plugin_serena_serena__replace_content
  mcp__plugin_serena_serena__replace_symbol_body
  mcp__plugin_serena_serena__safe_delete_symbol
  mcp__plugin_serena_serena__search_for_pattern
  mcp__plugin_serena_serena__write_memory
)

read -r -d '' _serena_section <<'EOF' || true
## Serena MCP — 코드 검색·심볼 탐색 강제

이 프로젝트는 Serena MCP 가 등록되어 있다. **코드 구조 탐색은 Serena 도구를 1순위로 사용한다.**

### 도구 우선순위
- 심볼/구조: `mcp__plugin_serena_serena__find_symbol`, `get_symbols_overview`, `find_referencing_symbols`, `find_implementations`, `find_declaration`
- 패턴/정규식 검색: `mcp__plugin_serena_serena__search_for_pattern`
- 파일 트리: `mcp__plugin_serena_serena__list_dir`, `find_file`
- Grep/Read 직접 호출은 다음 경우에만 허용
  - 텍스트 콘텐츠·마크다운·설정 파일 등 비-코드
  - Serena 도구로 도달 불가능한 구체적 사용 사례

### 세션 시작 흐름 (코드 작업 시작 시 1회)
1. `mcp__plugin_serena_serena__initial_instructions` 호출 — Serena 가이드를 컨텍스트에 로드
2. 활성 프로젝트 미설정이면 `mcp__plugin_serena_serena__activate_project` 로 현재 디렉터리 활성화
3. 신규 프로젝트면 `mcp__plugin_serena_serena__check_onboarding_performed` → 미수행 시 `onboarding`

### 금지
- 같은 검색을 Grep + Serena 둘 다 돌리지 말 것 (토큰 낭비). Serena 결과로 충분하면 거기서 끝낸다.
- "API 엔드포인트 목록", "함수 정의 찾아줘" 같은 심볼 기반 질문에 Grep 부터 가지 말 것.
EOF
CLAUDE_MD_SECTIONS+=("$_serena_section")
unset _serena_section

# SessionStart 훅 등록 — Claude Code 세션 시작 시 1회 Serena 초기화 지시 + ready flag 삭제
SESSION_START_HOOKS+=('${CLAUDE_PROJECT_DIR}/scripts/hooks/claude-sessionstart-serena.sh')

# PostToolUse — check_onboarding_performed 완료 시 ready flag 생성
POST_TOOL_USE_HOOKS+=('mcp__plugin_serena_serena__check_onboarding_performed::${CLAUDE_PROJECT_DIR}/scripts/hooks/claude-posttooluse-serena-ready.sh')

# PreToolUse — Serena 미초기화 시 Edit/Write/MultiEdit 차단
PRE_TOOL_USE_HOOKS+=('Edit|Write|MultiEdit::${CLAUDE_PROJECT_DIR}/scripts/hooks/claude-pretooluse-serena-guard.sh')

# hook 소스 파일 등록 (project-claude.sh 가 assets/hooks/ 에서 복사)
HARNESS_HOOK_SOURCES+=(
  claude-sessionstart-serena.sh
  claude-posttooluse-serena-ready.sh
  claude-pretooluse-serena-guard.sh
)

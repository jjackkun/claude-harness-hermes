# presets/lang/java.conf
# Java baseline. Pair with springboot.conf + jpa/mybatis + maven/gradle.

SKILLS+=(
  java-coding-standards
  tdd-workflow
)

# TODO: java-reviewer 에이전트 자산 제작 시 AGENTS+=(java-reviewer) 복원

RULES+=(java)

# NOTE: assets/agents/ 에 실존하는 에이전트만 deny 한다 (유령 항목 정리됨).
DENY_AGENTS+=(
  python-reviewer
  typescript-reviewer
)

ENV_VARS+=(
  JAVA_TOOL_OPTIONS=-Dfile.encoding=UTF-8
)

# Stop hook 의 Java compile 은 백그라운드 세션에서 매 응답마다 실행되어 토큰/시간 폭증.
# pre-commit / CI 에서 동일 검사 수행하므로 제거. 필요시 수동 실행.

read -r -d '' _java_section <<'EOF' || true
## Java
- JDK: 저장소의 `.java-version` / `pom.xml` / `build.gradle`에 지정된 버전 사용
- 포맷터: `google-java-format` (Spotless 플러그인 통해 CI 강제)
- Null 안정성: `Optional<T>` 우선, `null` 반환 지양
- Checked exception 을 공개 API 시그니처에 퍼뜨리지 말 것
- Lombok 의존성이 있을 때만 `@Data`/`@Builder` 사용 (없는 프로젝트엔 주입 금지)
- 동시성 코드는 `java.util.concurrent` 우선, 직접 `Thread` 사용 금지
EOF
CLAUDE_MD_SECTIONS+=("$_java_section")
unset _java_section

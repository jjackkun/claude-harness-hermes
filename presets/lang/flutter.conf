# presets/lang/flutter.conf
# Flutter / Dart baseline.

SKILLS+=(
  dart-flutter-patterns
  flutter-dart-code-review
  tdd-workflow
)

# TODO: flutter-reviewer 에이전트 자산 제작 시 AGENTS+=(flutter-reviewer) 복원

RULES+=(dart)

# NOTE: assets/agents/ 에 실존하는 에이전트만 deny 한다 (유령 항목 정리됨).
DENY_AGENTS+=(
  python-reviewer
  typescript-reviewer
)

POST_EDIT_HOOKS+=(
  'f="$CLAUDE_TOOL_FILE_PATH"; [[ "$f" == *.dart ]] && command -v dart >/dev/null 2>&1 && dart format "$f" 2>/dev/null || true'
)

# Stop hook 의 dart analyze / flutter test 는 백그라운드 세션에서 매 응답마다 실행되어 토큰/시간 폭증.
# pre-commit / CI 에서 동일 검사 수행하므로 제거. 필요시 수동 실행: dart analyze / flutter test

read -r -d '' _flutter_section <<'EOF' || true
## Flutter / Dart
- Dart SDK 및 Flutter 채널은 `pubspec.yaml` 의 `environment` 기준으로 맞출 것
- 린트: `flutter_lints` 패키지 기본 규칙 준수
- 상태 관리는 프로젝트가 이미 쓰는 것만 사용 (Riverpod / Bloc / Provider 임의 혼용 금지)
- UI 위젯은 가능한 `const` 생성자 사용
- 비동기 `Future` 처리 시 `unawaited()` 명시 또는 `await`
EOF
CLAUDE_MD_SECTIONS+=("$_flutter_section")
unset _flutter_section

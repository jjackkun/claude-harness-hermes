# presets/lang/python.conf
# Python backend baseline. Framework-agnostic (pair with fastapi.conf etc.).

SKILLS+=(
  python-patterns
  tdd-workflow
)
# TODO: pytest-workflow 스킬 자산 제작 시 SKILLS 에 복원

AGENTS+=(
  python-reviewer
)

RULES+=(python)

# Block non-Python language agents so they don't hijack auto-delegation.
# NOTE: assets/agents/ 에 실존하는 에이전트만 deny 한다 (유령 항목 정리됨).
DENY_AGENTS+=(
  typescript-reviewer
)

ENV_VARS+=(
  PYTHONDONTWRITEBYTECODE=1
)

# ruff autoformat + fix on every .py edit
POST_EDIT_HOOKS+=(
  'f="$CLAUDE_TOOL_FILE_PATH"; [[ "$f" == *.py ]] && { ruff check --fix "$f" 2>&1 | head -20; ruff format "$f" 2>&1 | head -5; } || true'
)

# Stop hook 의 ruff/mypy 는 백그라운드 세션에서 매 응답마다 실행되어 토큰/시간 폭증.
# pre-commit hook 에서 동일 검사 수행하므로 제거. 필요시 명령으로 수동 실행.

read -r -d '' _python_section <<'EOF' || true
## Python
- 버전: Python 3.11+ 가정 (별도 명시 없으면)
- 포맷터/린터: `ruff check --fix` + `ruff format` (black/isort 대체)
- 타입 체커: `mypy --strict` 또는 모듈 단위 strict
- 테스트: `pytest` (async는 `pytest-asyncio`)
- import 순서는 ruff가 관리 — 수동 정렬 금지
- 비동기 코드에서 `asyncio.run` 중첩 호출 금지
- 예외는 구체 타입으로 catch. `except Exception: pass` 금지 (silent-failure-hunter 트리거)
EOF
CLAUDE_MD_SECTIONS+=("$_python_section")
unset _python_section

# Harness 동반: python 권한 화이트리스트 머지 (3차 PR).
# harness preset 이 같이 지정되지 않았어도 무해 — HARNESS_PERMISSIONS_ALLOW 는
# generate_settings_local 이 항상 permissions.allow 로 내보낸다.
merge_permissions_file "$ASSETS_DIR/permissions/python.json"

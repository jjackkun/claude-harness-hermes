# presets/lang/node.conf
# Node.js / TypeScript baseline. Pair with framework preset (svelte/vue/react).

SKILLS+=(
  node-patterns
  typescript-patterns
  tdd-workflow
)

AGENTS+=(
  typescript-reviewer
)

RULES+=(typescript)

# NOTE: assets/agents/ 에 실존하는 에이전트만 deny 한다 (유령 항목 정리됨).
DENY_AGENTS+=(
  python-reviewer
)

ENV_VARS+=(
  NODE_OPTIONS=--enable-source-maps
)

# Auto-format JS/TS/JSON/MD on edit. Prefer biome if present, fall back to prettier.
POST_EDIT_HOOKS+=(
  'f="$CLAUDE_TOOL_FILE_PATH"; case "$f" in *.ts|*.tsx|*.js|*.jsx|*.json|*.md) command -v biome >/dev/null 2>&1 && biome format --write "$f" 2>/dev/null || { command -v prettier >/dev/null 2>&1 && prettier --write "$f" 2>/dev/null; } ;; esac; true'
)

# Stop hook 의 tsc/eslint 는 백그라운드 세션에서 매 응답마다 실행되어 토큰/시간 폭증.
# pre-commit hook (assets/hooks/pre-commit.sh) 에서 동일 검사 수행하므로 제거.
# 필요시 명령으로 수동 실행: pnpm tsc --noEmit / pnpm eslint .

read -r -d '' _node_section <<'EOF' || true
## Node.js / TypeScript
- 패키지 매니저는 저장소에 있는 lockfile을 따를 것 (`pnpm-lock.yaml` > `yarn.lock` > `package-lock.json`)
- TypeScript `strict: true` 기본 가정
- ESM 우선, CommonJS는 레거시 의존성 때문일 때만
- `any` 남발 금지. 부득이하면 이유를 주석으로
- `console.log` 디버그는 커밋 전 제거
EOF
CLAUDE_MD_SECTIONS+=("$_node_section")
unset _node_section

# Harness 동반: node 권한 화이트리스트 머지 (3차 PR).
merge_permissions_file "$ASSETS_DIR/permissions/node.json"

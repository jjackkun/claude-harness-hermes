# presets/tools/understand-anything.conf  (setup.sh [tools] 라벨: understand-anything)
# Understand Anything — 코드베이스를 멀티 에이전트 파이프라인으로 분석해
# 인터랙티브 지식 그래프 + 가이드 투어 + 변경 영향 분석으로 만드는 Claude Code 플러그인.
# https://github.com/Egonex-AI/Understand-Anything
#
# 주의 — 전역(user scope) 플러그인:
#   이 preset 을 어느 프로젝트에서 고르든 플러그인은 ~/.claude(전역)에 한 번 설치되고
#   /understand 는 모든 프로젝트에서 동작한다. preset 선택 = "이 플러그인을 쓰겠다"는 opt-in.
#
# 사용:
#   /understand              코드베이스 분석 → .understand-anything/knowledge-graph.json
#   /understand-dashboard    인터랙티브 대시보드 열기
#   /understand --language ko  한국어 출력
# 주의 — 최초 /understand 는 전체 코드베이스를 분석하므로 토큰 소모가 크다(이후는 증분).

PLUGIN_MARKETPLACES+=(Egonex-AI/Understand-Anything)
PLUGINS+=(understand-anything@understand-anything)

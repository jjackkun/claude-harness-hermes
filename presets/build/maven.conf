# presets/build/maven.conf
# Maven build tool.

# TODO: maven-patterns 스킬 자산 제작 시 SKILLS+=(maven-patterns) 복원
# TODO: maven 룰 자산 제작 시 RULES+=(maven) 복원

# Stop hook 의 mvn compile 은 백그라운드 세션에서 매 응답마다 실행되어 토큰/시간 폭증.
# pre-commit / CI 에서 동일 검사 수행하므로 제거. 필요시 수동 실행: mvn compile

read -r -d '' _maven_section <<'EOF' || true
## Maven
- 의존성은 BOM(`dependencyManagement`)으로 버전 통일
- `mvn clean install` 보다 `mvn verify` 우선 (로컬 캐시 오염 방지)
- 멀티모듈은 reactor 빌드 — 루트 `pom.xml` 에 `<modules>` 명시
- 플러그인 버전은 lock — 루트 `<pluginManagement>` 활용
- 빌드 캐시: `~/.m2/wrapper`, CI 에서는 actions/cache 또는 Maven Daemon
- `mvn dependency:tree` 로 충돌 확인. `<exclusion>` 으로 정리
- Java 버전은 `maven-compiler-plugin` `<release>` 로 명시
EOF
CLAUDE_MD_SECTIONS+=("$_maven_section")
unset _maven_section

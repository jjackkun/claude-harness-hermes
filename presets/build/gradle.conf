# presets/build/gradle.conf
# Gradle build tool.

# TODO: gradle-patterns 스킬 자산 제작 시 SKILLS+=(gradle-patterns) 복원
# TODO: gradle 룰 자산 제작 시 RULES+=(gradle) 복원

# Stop hook 의 gradle assemble 은 백그라운드 세션에서 매 응답마다 실행되어 토큰/시간 폭증.
# pre-commit / CI 에서 동일 검사 수행하므로 제거. 필요시 수동 실행: ./gradlew assemble

read -r -d '' _gradle_section <<'EOF' || true
## Gradle
- Wrapper 사용 의무 — `./gradlew` 만 호출, 시스템 gradle 금지
- DSL: 신규 모듈은 Kotlin DSL (`build.gradle.kts`) 권장
- 의존성 선언: `implementation` 기본, `api` 는 의존성 전이가 필요할 때만
- 버전 카탈로그(`libs.versions.toml`) 로 버전 중앙 관리
- 빌드 캐시 활성화: `org.gradle.caching=true`
- 병렬 빌드: `org.gradle.parallel=true`
- 멀티모듈은 `settings.gradle(.kts)` 의 `include` 로 명시
- 테스트는 `./gradlew test --info` 로 디버그
EOF
CLAUDE_MD_SECTIONS+=("$_gradle_section")
unset _gradle_section

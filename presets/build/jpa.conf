# presets/build/jpa.conf
# JPA / Hibernate ORM patterns. Pair with java + springboot + a database preset.

SKILLS+=(
  jpa-patterns
)
# TODO: hibernate-patterns 스킬 자산 제작 시 SKILLS 에 복원
# TODO: jpa 룰 자산 제작 시 RULES+=(jpa) 복원

read -r -d '' _jpa_section <<'EOF' || true
## JPA / Hibernate
- N+1 쿼리 주의: 연관관계는 `FetchType.LAZY` 기본, 필요 시 `@EntityGraph` 또는 `JOIN FETCH`
- 양방향 연관관계는 편의 메서드(`addX`, `removeX`)로 동기화
- `@OneToMany` 컬렉션은 `Set` 보다 `List` 를 신중히 — Hibernate 가 `delete-all-and-reinsert` 할 수 있음
- `equals`/`hashCode` 는 비즈니스 키 기반, `id` 만 쓰면 detached 상태에서 깨짐
- 트랜잭션 경계 안에서만 lazy 로딩 — DTO 변환은 트랜잭션 안에서 끝내기
- `@Transactional(readOnly = true)` 조회 메서드에 활용
- DDL 자동 생성은 dev 만 — 운영은 Flyway/Liquibase 마이그레이션
EOF
CLAUDE_MD_SECTIONS+=("$_jpa_section")
unset _jpa_section

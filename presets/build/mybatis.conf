# presets/build/mybatis.conf
# MyBatis SQL mapper. Pair with java + springboot + a database preset.

# TODO: mybatis-patterns 스킬 자산 제작 시 SKILLS+=(mybatis-patterns) 복원
# TODO: mybatis 룰 자산 제작 시 RULES+=(mybatis) 복원

read -r -d '' _mybatis_section <<'EOF' || true
## MyBatis
- 매퍼 인터페이스 + XML 매퍼 분리 권장 (어노테이션 단독은 단순 쿼리만)
- 동적 SQL 은 `<if>`, `<choose>`, `<foreach>` 사용. Java 측 문자열 조립 금지
- `${}` 와 `#{}` 구분 엄수: `${}` 는 SQL injection 위험, 컬럼/테이블 이름 등 메타에만
- `resultMap` 으로 명시적 매핑, `resultType` 자동 매핑은 단순 select 에만
- 1차 캐시는 세션 단위, 2차 캐시는 신중히 (분산 환경 동기화 문제)
- `<select>` 결과는 페이징 라이브러리(PageHelper / MyBatis-Plus) 또는 명시적 LIMIT/OFFSET
- 매퍼 단위 테스트는 `@MybatisTest` 또는 H2/Testcontainers 활용
EOF
CLAUDE_MD_SECTIONS+=("$_mybatis_section")
unset _mybatis_section

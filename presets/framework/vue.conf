# presets/framework/vue.conf
# Vue 3 / Nuxt frontend. Usually pair with lang/node.conf.

SKILLS+=(
  frontend-design
  frontend-patterns
)
# TODO: vue-patterns 스킬 자산 제작 시 SKILLS 에 복원

RULES+=(web)

HARNESS_COMPONENT_STRUCTURE=1   # R-struct-1~3: 폴더+배럴 규칙 pre-commit + ESLint 강제

POST_EDIT_HOOKS+=(
  'f="$CLAUDE_TOOL_FILE_PATH"; [[ "$f" == *.vue ]] && command -v prettier >/dev/null 2>&1 && prettier --write "$f" 2>/dev/null || true'
)

# Stop hook 의 vue-tsc 는 백그라운드 세션에서 매 응답마다 실행되어 토큰/시간 폭증.
# pre-commit hook 에서 동일 검사 수행하므로 제거. 필요시 수동 실행: pnpm vue-tsc --noEmit

read -r -d '' _vue_section <<'EOF' || true
## Vue 3
- Composition API + `<script setup lang="ts">` 기본
- Options API 는 레거시 코드일 때만
- 상태 관리는 Pinia, Vuex 는 레거시만
- 양방향 바인딩은 `v-model` 한정, `ref.value` 외부 노출 지양
- Nuxt 프로젝트라면 `pages/`, `server/api/`, `composables/` 디렉터리 규약 준수
EOF
CLAUDE_MD_SECTIONS+=("$_vue_section")
unset _vue_section

# presets/framework/svelte.conf
# Svelte / SvelteKit frontend. Usually pair with lang/node.conf.

SKILLS+=(
  svelte-patterns
  frontend-design
  frontend-patterns
  impeccable
  webapp-testing
)

AGENTS+=(
  fullstack-developer
)

RULES+=(web)

# .svelte files: run prettier with the svelte plugin if present.
POST_EDIT_HOOKS+=(
  'f="$CLAUDE_TOOL_FILE_PATH"; [[ "$f" == *.svelte ]] && command -v prettier >/dev/null 2>&1 && prettier --write --plugin prettier-plugin-svelte "$f" 2>/dev/null || true'
)

# Stop hook 의 svelte-check 는 백그라운드 세션에서 매 응답마다 실행되어 토큰/시간 폭증.
# pre-commit hook 에서 동일 검사 수행하므로 제거. 필요시 수동 실행: pnpm svelte-check

read -r -d '' _svelte_section <<'EOF' || true
## Svelte / SvelteKit
- Svelte 5 runes(`$state`, `$derived`, `$effect`) 기반 기본. 구버전은 저장소 설정 따름
- 상태는 컴포넌트 로컬이 기본, 전역은 `$lib/stores` 에만
- `+page.svelte`/`+page.server.ts` 규약 준수 — 데이터 로딩은 `load()` 에서
- 폼 submit은 `enhance` + progressive enhancement 기본
- 빌드 출력 `.svelte-kit/` 는 커밋 금지
EOF
CLAUDE_MD_SECTIONS+=("$_svelte_section")
unset _svelte_section

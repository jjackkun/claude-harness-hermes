# presets/framework/fastapi.conf
# FastAPI backend. Expects lang/python.conf to be loaded first.

SKILLS+=(
  fastapi-patterns
  fastapi-testing
  backend-patterns
)

# python-reviewer already added by lang/python.conf; we don't duplicate.

RULES+=(fastapi)

# httpx/pytest-asyncio tests usually need these.
ENV_VARS+=(
  PYTHONASYNCIODEBUG=0
)

read -r -d '' _fastapi_section <<'EOF' || true
## FastAPI
- Pydantic v2 우선 (`BaseModel`, `Field`, `model_validate`)
- 엔드포인트 기본 `async def` — 동기 코드는 `run_in_threadpool`
- 의존성 주입은 `Depends()` 활용, 전역 싱글톤 남용 금지
- 응답 모델은 `response_model` 명시 — 민감 필드 누수 방지
- 예외는 `HTTPException` 또는 `@app.exception_handler` 로 변환
- 테스트는 `httpx.AsyncClient(transport=ASGITransport(app=app))` 사용
- 데이터베이스 세션은 요청 스코프로 열고 `finally` 에서 닫기 (또는 `contextmanager`)
EOF
CLAUDE_MD_SECTIONS+=("$_fastapi_section")
unset _fastapi_section

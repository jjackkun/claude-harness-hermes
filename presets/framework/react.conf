# presets/framework/react.conf
# React (CRA / Vite / Next.js) frontend. Usually pair with lang/node.conf.

SKILLS+=(
  frontend-design
  frontend-patterns
)
# TODO: react-patterns 스킬 자산 제작 시 SKILLS 에 복원

RULES+=(web)

POST_EDIT_HOOKS+=(
  'f="$CLAUDE_TOOL_FILE_PATH"; case "$f" in *.tsx|*.jsx) command -v prettier >/dev/null 2>&1 && prettier --write "$f" 2>/dev/null ;; esac; true'
)

# Stop hook 의 tsc 는 백그라운드 세션에서 매 응답마다 실행되어 토큰/시간 폭증.
# pre-commit hook 에서 동일 검사 수행하므로 제거. 필요시 수동 실행.

read -r -d '' _react_section <<'EOF' || true
## React
- 함수형 컴포넌트 + Hooks 만 사용. 클래스 컴포넌트 신규 작성 금지
- 상태 관리는 프로젝트가 이미 쓰는 것 (Zustand / Redux Toolkit / Jotai) 을 따를 것
- `useEffect` 는 외부 시스템 동기화 용도로만. 파생 상태 계산엔 금지
- 리스트 렌더링 `key` 는 안정적 ID 사용 (인덱스 금지)
- Next.js 프로젝트라면 Server Components 기본, `'use client'` 는 필요할 때만
EOF
CLAUDE_MD_SECTIONS+=("$_react_section")
unset _react_section

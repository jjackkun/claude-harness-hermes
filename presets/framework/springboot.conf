# presets/framework/springboot.conf
# Spring Boot backend. Pair with lang/java.conf + jpa or mybatis + maven or gradle.

SKILLS+=(
  springboot-patterns
  springboot-security
  springboot-tdd
  backend-patterns
)

# TODO: spring-boot 룰 자산 제작 시 RULES+=(spring-boot) 복원

read -r -d '' _spring_section <<'EOF' || true
## Spring Boot
- 컨트롤러는 얇게 — 비즈니스 로직은 서비스 계층
- DTO 는 API 경계에서만 사용, 도메인 객체 노출 금지
- 트랜잭션은 `@Transactional` 을 서비스 메서드에 명시 (필요한 경우만)
- 빈 등록은 컴포넌트 스캔 + `@Component`/`@Service`/`@Repository`/`@Configuration`
- 설정값은 `@ConfigurationProperties` 우선, `@Value` 단발성에만
- 예외는 `@ControllerAdvice` 로 중앙 처리
- 테스트: `@SpringBootTest` 는 무거우므로 슬라이스 테스트(`@WebMvcTest`, `@DataJpaTest`) 우선
EOF
CLAUDE_MD_SECTIONS+=("$_spring_section")
unset _spring_section
